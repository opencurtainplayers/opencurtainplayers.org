<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d14;
        --bg-accent: #111828;
        --text: #e8ecf7;
        --muted: #a4b0c8;
        --line: #2a3248;
        --highlight: #8fc7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 0%, #1c2745 0%, transparent 45%),
          radial-gradient(circle at 80% 100%, #1a2a4d 0%, transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: "Source Serif 4", Georgia, serif;
        line-height: 1.75;
      }

      .page {
        max-width: 56rem;
        margin: 0 auto;
        padding: 5rem 1.5rem;
      }

      .card {
        background: linear-gradient(
          160deg,
          rgba(17, 24, 40, 0.9),
          rgba(12, 17, 30, 0.96)
        );
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: clamp(1.5rem, 3vw, 3rem);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      }

      h1,
      h2,
      h3 {
        margin: 0 0 1rem;
        color: #f4f7ff;
        font-family: "Fraunces", "Times New Roman", serif;
        line-height: 1.15;
        letter-spacing: 0.02em;
      }

      h1 {
        font-size: clamp(2rem, 3.4vw, 3.2rem);
        text-wrap: balance;
      }

      p {
        margin: 0;
        color: var(--text);
        font-size: clamp(1.08rem, 1.1vw, 1.26rem);
        max-width: 68ch;
      }

      p + p {
        margin-top: 1rem;
      }

      strong {
        color: var(--highlight);
      }

      @media (max-width: 680px) {
        .page {
          padding-top: 2.25rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="card">
        {{ content }}
      </article>
    </main>
  </body>
</html>
